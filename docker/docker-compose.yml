version: '3.8'

# ============================================================
# 数据中心运行监控大屏 — Docker 环境
# 使用 Docker Compose 一键部署 MySQL 8.0 数据库
# ============================================================

services:
  mysql:
    image: mysql:8.0
    container_name: ene_dc_monitor_mysql
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: ene_datacenter
      MYSQL_USER: ene_user
      MYSQL_PASSWORD: ene_pass_2026
      TZ: Asia/Shanghai

    ports:
      - "3306:3306"

    volumes:
      # 挂载自定义 MySQL 配置
      - ./my.cnf:/etc/mysql/conf.d/my.cnf:ro
      # 持久化 MySQL 数据（容器销毁后数据不丢失）
      - mysql_data:/var/lib/mysql
      # 挂载初始化 SQL 脚本（容器首次启动时自动执行）
      - ../sql:/docker-entrypoint-initdb.d:ro

    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
      - --max-allowed-packet=256M
      - --local-infile=1

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql_data:
    driver: local
